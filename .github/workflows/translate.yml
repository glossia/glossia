name: Translate

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  translate:
    name: Translate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: "!startsWith(github.event.head_commit.message, '[l10n]') && !startsWith(github.event.head_commit.message, '[Release]')"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: cli

      - name: Build executable
        run: |
          mkdir -p ./dist/bin
          bun build ./src/main.ts --compile --target bun-linux-x64 --outfile ./dist/bin/glossia
        working-directory: cli

      - name: Check translation status
        id: status
        run: |
          if ./cli/dist/bin/glossia status; then
            echo "stale=false" >> "$GITHUB_OUTPUT"
          else
            echo "stale=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run translations
        if: steps.status.outputs.stale == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: ./cli/dist/bin/glossia translate

      - name: Create PR with translations
        if: steps.status.outputs.stale == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No translation changes detected"
            exit 0
          fi

          BRANCH="l10n/update-translations"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "[l10n] Update translations"
          git push --force origin "$BRANCH"

          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists, force-pushed update"
          else
            gh pr create \
              --title "[l10n] Update translations" \
              --body "Automated translation update triggered by push to main." \
              --head "$BRANCH" \
              --base main
          fi
