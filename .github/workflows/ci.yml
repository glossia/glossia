name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Format check
        run: bun run format

  test-build:
    name: Typecheck, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun run test
      - name: Build
        run: bun run build

  executables:
    name: Executable (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    needs: [format, test-build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: glossia-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: glossia-linux-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: glossia-darwin-x64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: glossia-darwin-arm64
          - os: windows-latest
            target: bun-windows-x64
            artifact: glossia-windows-x64.exe
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build executable
        run: bun run build:exe --targets ${{ matrix.target }}
      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: cli/dist/bin/${{ matrix.artifact }}
