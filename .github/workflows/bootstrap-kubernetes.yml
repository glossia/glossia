name: Bootstrap Kubernetes Cluster

on:
  workflow_dispatch:

jobs:
  bootstrap:
    name: Bootstrap Kubernetes Cluster
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up mise
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Install tools
        run: mise install

      - name: Require 1Password service account
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          if [ -z "${OP_SERVICE_ACCOUNT_TOKEN:-}" ]; then
            echo "::error::Missing OP_SERVICE_ACCOUNT_TOKEN in the production environment"
            exit 1
          fi

      - name: Load Kubernetes secrets from 1Password
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: ./deploy/1password/load-kubernetes-env.sh --github-env "$GITHUB_ENV" --require K8S_KUBECONFIG_B64

      - name: Verify kubectl and Helm from mise
        run: |
          mise exec -- kubectl version --client
          mise exec -- helm version

      - name: Write kubeconfig from 1Password
        run: |
          if [ -z "${K8S_KUBECONFIG_B64:-}" ]; then
            echo "::error::Missing K8S_KUBECONFIG_B64 in 1Password"
            exit 1
          fi

          printf '%s' "$K8S_KUBECONFIG_B64" | base64 --decode > "$RUNNER_TEMP/kubeconfig"
          chmod 600 "$RUNNER_TEMP/kubeconfig"
          echo "KUBECONFIG=$RUNNER_TEMP/kubeconfig" >> "$GITHUB_ENV"

      - name: Render Kubernetes secrets from 1Password
        run: |
          mise exec -- kubectl apply -f deploy/k8s/manifests/base/namespaces.yaml
          mise exec -- ./deploy/k8s/render-secrets.sh | mise exec -- kubectl apply -f -

      - name: Create GHCR pull secret from 1Password
        run: |
          if [ -z "${GHCR_PULL_USERNAME:-}" ] || [ -z "${GHCR_PULL_TOKEN:-}" ]; then
            exit 0
          fi

          mise exec -- kubectl -n glossia create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username="$GHCR_PULL_USERNAME" \
            --docker-password="$GHCR_PULL_TOKEN" \
            --dry-run=client \
            -o yaml | mise exec -- kubectl apply -f -

      - name: Bootstrap cluster services
        run: mise exec -- ./deploy/k8s/bootstrap-cluster.sh
