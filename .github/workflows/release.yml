name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "The version to release (e.g. v0.2.0)."
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: "!startsWith(github.event.head_commit.message, '[Release]')"
    outputs:
      should_release: ${{ steps.releasable.outputs.should_release }}
      version: ${{ steps.next-version.outputs.version }}
      release_notes: ${{ steps.release-notes.outputs.release_notes }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@2.10.0
      - name: Check if there are releasable changes
        id: releasable
        run: |
          bumped_output=$(git cliff --config cliff.toml --bump --unreleased)
          changelog_content=$(cat CHANGELOG.md)

          bumped_hash=$(echo -n "$bumped_output" | shasum -a 256 | awk '{print $1}')
          changelog_hash=$(echo -n "$changelog_content" | shasum -a 256 | awk '{print $1}')

          if [ "$bumped_hash" != "$changelog_hash" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Get next version
        id: next-version
        if: steps.releasable.outputs.should_release == 'true'
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(git cliff --config cliff.toml --bumped-version)" >> "$GITHUB_OUTPUT"
          fi
      - name: Generate changelog
        if: steps.releasable.outputs.should_release == 'true'
        run: git cliff --config cliff.toml --bump -o CHANGELOG.md
      - name: Upload changelog
        if: steps.releasable.outputs.should_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: CHANGELOG.md
      - name: Get release notes
        id: release-notes
        if: steps.releasable.outputs.should_release == 'true'
        run: |
          echo "release_notes<<EOF" >> "$GITHUB_OUTPUT"
          git cliff --config cliff.toml --latest --strip all --body "$(cat .github/release-notes.tmpl)" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  build:
    name: Build artifacts
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            ext: ""
          - os: ubuntu-latest
            target: bun-linux-arm64
            ext: ""
          - os: macos-latest
            target: bun-darwin-x64
            ext: ""
          - os: macos-latest
            target: bun-darwin-arm64
            ext: ""
          - os: windows-latest
            target: bun-windows-x64
            ext: ".exe"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: cli
      - name: Build executable
        run: |
          mkdir -p ./dist/bin
          bun build ./src/main.ts --compile --target ${{ matrix.target }} --outfile ./dist/bin/glossia${{ matrix.ext }}
        working-directory: cli
      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "cli/dist/bin/glossia${{ matrix.ext }}" "dist/glossia${{ matrix.ext }}"
          cd dist
          tar -czf "glossia-${{ matrix.target }}.tar.gz" "glossia${{ matrix.ext }}"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glossia-${{ matrix.target }}
          path: dist/glossia-${{ matrix.target }}.tar.gz

  release:
    name: Publish release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [prepare, build]
    if: needs.prepare.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: changelog
      - name: Commit and tag release
        id: release-commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "[Release] glossia ${{ needs.prepare.outputs.version }}"
          git tag "${{ needs.prepare.outputs.version }}"
          git push origin main --tags
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: glossia-*
      - name: Gather artifacts
        run: |
          mkdir -p release
          find dist -name "*.tar.gz" -exec mv {} release/ \;
          cd release
          sha256sum *.tar.gz > SHA256.txt
          sha512sum *.tar.gz > SHA512.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          name: ${{ needs.prepare.outputs.version }}
          tag_name: ${{ needs.prepare.outputs.version }}
          body: ${{ needs.prepare.outputs.release_notes }}
          target_commitish: ${{ steps.release-commit.outputs.commit_sha }}
          files: |
            release/*.tar.gz
            release/SHA256.txt
            release/SHA512.txt
