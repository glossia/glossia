name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.16.0). Leave empty to auto-bump from conventional commits."
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  GIT_CLIFF_VERSION: "2.10.0"
  CLI_INCLUDE_PATH: "cli/**"

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: "!startsWith(github.event.head_commit.message, '[Release]')"
    outputs:
      should_release: ${{ steps.detect.outputs.should_release }}
      tag_name: ${{ steps.detect.outputs.tag_name }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@${{ env.GIT_CLIFF_VERSION }}

      - name: Detect releasable changes
        id: detect
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_VERSION:-}" ]; then
            version="${INPUT_VERSION#v}"
            version="${version#cli-v}"
            tag_name="cli-v${version}"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
            echo "version=${version}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changelog="$(git cliff --config cliff.toml --include-path "${CLI_INCLUDE_PATH}" --unreleased --bump 2>/dev/null || true)"
          notes_section="$(printf '%s' "${changelog}" | sed -n '/<!-- RELEASE NOTES START -->/,/<!-- generated by git-cliff -->/p')"

          if printf '%s' "${notes_section}" | grep -qE '^\*'; then
            tag_name="$(git cliff --config cliff.toml --include-path "${CLI_INCLUDE_PATH}" --bumped-version)"
            version="${tag_name#cli-v}"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
            echo "version=${version}" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish to S3
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [prepare]
    if: needs.prepare.outputs.should_release == 'true'
    outputs:
      version: ${{ needs.prepare.outputs.version }}
      tag_name: ${{ needs.prepare.outputs.tag_name }}
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.tag_name }}
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      RELEASE_AWS_REGION: ${{ vars.RELEASE_AWS_REGION }}
      RELEASE_S3_BUCKET: ${{ vars.RELEASE_S3_BUCKET }}
      RELEASE_S3_PREFIX: ${{ vars.RELEASE_S3_PREFIX }}
      RELEASE_S3_ENDPOINT: ${{ vars.RELEASE_S3_ENDPOINT }}
      RELEASE_BASE_URL: ${{ vars.RELEASE_BASE_URL }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@${{ env.GIT_CLIFF_VERSION }}

      - name: Generate CHANGELOG
        run: |
          mkdir -p cli
          git cliff \
            --config cliff.toml \
            --include-path "${CLI_INCLUDE_PATH}" \
            --bump \
            --output cli/CHANGELOG.md

      - name: Generate release notes
        run: |
          git cliff \
            --config cliff.toml \
            --include-path "${CLI_INCLUDE_PATH}" \
            --unreleased \
            --tag "${RELEASE_TAG}" \
            > release-notes.md

      - name: Commit changelog and tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add cli/CHANGELOG.md
          if ! git diff --cached --quiet; then
            git commit -m "[Release] glossia ${RELEASE_TAG}"
          fi

          if ! git rev-parse "${RELEASE_TAG}" >/dev/null 2>&1; then
            git tag "${RELEASE_TAG}"
          fi

      - name: Build release artifacts and checksums
        shell: bash
        working-directory: cli
        run: |
          mkdir -p dist/bin ../release

          targets=(
            "linux amd64 glossia-linux-x64 tar.gz"
            "linux arm64 glossia-linux-arm64 tar.gz"
            "darwin amd64 glossia-darwin-x64 tar.gz"
            "darwin arm64 glossia-darwin-arm64 tar.gz"
            "windows amd64 glossia-windows-x64 zip"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch name archive <<< "$target"
            ext=""
            if [ "$goos" = "windows" ]; then
              ext=".exe"
            fi

            output="dist/bin/${name}${ext}"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags "-s -w" -o "$output" ./cmd/glossia

            stagedir="$(mktemp -d)"
            cp "$output" "$stagedir/glossia${ext}"

            if [ "$archive" = "zip" ]; then
              (cd "$stagedir" && zip -q "${GITHUB_WORKSPACE}/release/${name}.zip" "glossia${ext}")
            else
              tar -C "$stagedir" -czf "../release/${name}.tar.gz" "glossia${ext}"
            fi

            rm -rf "$stagedir"
          done

          cd ../release
          sha256sum *.tar.gz *.zip > SHA256SUMS
          sha512sum *.tar.gz *.zip > SHA512SUMS

      - name: Validate release environment
        id: release-env-check
        shell: bash
        run: |
          required=(AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY RELEASE_AWS_REGION RELEASE_S3_BUCKET RELEASE_BASE_URL)
          missing=()
          for key in "${required[@]}"; do
            value="${!key:-}"
            if [ -z "$value" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::warning::Skipping release publish because required values are missing: ${missing[*]}"
            echo "can_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "can_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install rclone
        if: steps.release-env-check.outputs.can_publish == 'true'
        run: |
          command -v rclone >/dev/null 2>&1 || curl https://rclone.org/install.sh | sudo bash
          rclone version | head -1

      - name: Configure rclone remote
        if: steps.release-env-check.outputs.can_publish == 'true'
        shell: bash
        run: |
          {
            echo "[release]"
            echo "type = s3"
            echo "provider = AWS"
            echo "access_key_id = ${AWS_ACCESS_KEY_ID}"
            echo "secret_access_key = ${AWS_SECRET_ACCESS_KEY}"
            echo "region = ${RELEASE_AWS_REGION}"
            if [ -n "${RELEASE_S3_ENDPOINT:-}" ]; then
              echo "endpoint = ${RELEASE_S3_ENDPOINT}"
            fi
          } > rclone.conf

      - name: Upload release artifacts to S3
        if: steps.release-env-check.outputs.can_publish == 'true'
        shell: bash
        env:
          RCLONE_CONFIG: ${{ github.workspace }}/rclone.conf
        run: |
          prefix="${RELEASE_S3_PREFIX:-}"
          prefix="${prefix#/}"
          if [ -n "$prefix" ] && [ "${prefix: -1}" != "/" ]; then
            prefix="$prefix/"
          fi

          version_path="release:${RELEASE_S3_BUCKET}/${prefix}${RELEASE_VERSION}/"
          latest_path="release:${RELEASE_S3_BUCKET}/${prefix}latest/"

          rclone copy release "$version_path" --progress --checksum
          rclone copy release "$latest_path" --progress --checksum

      - name: Push release commit and tag
        if: steps.release-env-check.outputs.can_publish == 'true'
        run: git push origin main --follow-tags

      - name: Publish GitHub release
        if: steps.release-env-check.outputs.can_publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body_path: release-notes.md
          files: release/*

  aqua-registry:
    name: Contribute Aqua Registry entry
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [prepare, publish]
    if: needs.prepare.outputs.should_release == 'true'
    env:
      RELEASE_VERSION: ${{ needs.publish.outputs.version }}
      RELEASE_TAG: ${{ needs.publish.outputs.tag_name }}
      RELEASE_BASE_URL: ${{ vars.RELEASE_BASE_URL }}
      AQUA_REGISTRY_FORK: ${{ vars.AQUA_REGISTRY_FORK }}
      GH_TOKEN: ${{ secrets.AQUA_REGISTRY_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Check aqua registry configuration
        id: precheck
        shell: bash
        run: |
          if [ -z "${GH_TOKEN:-}" ] || [ -z "${AQUA_REGISTRY_FORK:-}" ] || [ -z "${RELEASE_BASE_URL:-}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping aqua-registry contribution (missing GH token, fork, or base URL)"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Render Aqua registry package
        if: steps.precheck.outputs.skip != 'true'
        run: |
          mkdir -p /tmp/glossia-aqua
          cd cli
          go run ./cmd/render-aqua-registry --base-url "$RELEASE_BASE_URL" --output /tmp/glossia-aqua/registry.yaml

      - name: Create PR against aqua-registry
        if: steps.precheck.outputs.skip != 'true'
        shell: bash
        run: |
          fork_owner="${AQUA_REGISTRY_FORK%%/*}"
          branch="feat/glossia-${RELEASE_VERSION//[^a-zA-Z0-9._-]/-}"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/${AQUA_REGISTRY_FORK}.git" aqua-registry
          cd aqua-registry

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$branch"
          mkdir -p pkgs/glossia/glossia
          cp /tmp/glossia-aqua/registry.yaml pkgs/glossia/glossia/registry.yaml

          if git diff --quiet -- pkgs/glossia/glossia/registry.yaml; then
            echo "No aqua-registry changes to contribute"
            exit 0
          fi

          git add pkgs/glossia/glossia/registry.yaml
          git commit -m "feat: add glossia package"
          git push -u origin "$branch"

          existing_pr=$(gh pr list --repo aquaproj/aqua-registry --head "${fork_owner}:${branch}" --json number --jq '.[0].number // empty')
          if [ -n "$existing_pr" ]; then
            echo "Aqua registry PR #$existing_pr already exists"
            exit 0
          fi

          gh pr create \
            --repo aquaproj/aqua-registry \
            --base main \
            --head "${fork_owner}:${branch}" \
            --title "feat: add glossia package" \
            --body "Add \`glossia/glossia\` package backed by versioned S3 release artifacts.\n\nRelease: ${RELEASE_VERSION}\nBase URL: ${RELEASE_BASE_URL}"
