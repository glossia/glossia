  community_dry_run:
    name: Community Image Dry Run
    runs-on: 'ubuntu-latest'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3df4ab11eba7bda6032a0b82a6bb43b11571feac # v4
      - name: Cache Docker images.
        uses: ScribeMD/docker-cache@0.3.6
        with:
          key: docker-community-${{ runner.os }}-${{ hashFiles('Dockerfile') }}
      - run: docker build . -t glossia --build-arg GLOSSIA_PLAN=community
  enterprise_dry_run:
    name: Enterprise Image Dry Run
    runs-on: 'ubuntu-latest'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3df4ab11eba7bda6032a0b82a6bb43b11571feac # v4
      - name: Cache Docker images.
        uses: ScribeMD/docker-cache@0.3.6
        with:
          key: docker-enterprise-${{ runner.os }}-${{ hashFiles('Dockerfile') }}
      - run: docker build . -t glossia --build-arg GLOSSIA_PLAN=enterprise
  cloud_dry_run:
    name: Cloud Image Dry Run
    runs-on: 'ubuntu-latest'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3df4ab11eba7bda6032a0b82a6bb43b11571feac # v4
      - name: Cache Docker images.
        uses: ScribeMD/docker-cache@0.3.6
        with:
          key: docker-cloud-${{ runner.os }}-${{ hashFiles('Dockerfile') }}
      - run: docker build . -t glossia --build-arg GLOSSIA_PLAN=cloud --build-arg OBAN_WEB_FETCH_PUBLIC_KEY=${{env.OBAN_WEB_FETCH_PUBLIC_KEY}} --build-arg OBAN_WEB_AUTH_KEY=${{env.OBAN_WEB_AUTH_KEY}}