name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up mise
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Install tools
        run: mise install

      - name: Add server host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 89.167.60.202 >> ~/.ssh/known_hosts

      - name: Decrypt secrets
        run: fnox export --format env >> "$GITHUB_ENV"
        env:
          GLOSSIA_AGE_KEY: ${{ secrets.GLOSSIA_AGE_KEY }}

      - name: Configure SSH key from fnox
        run: |
          if [ -z "${SSH_PRIVATE_KEY_B64:-}" ]; then
            echo "::error::Missing SSH_PRIVATE_KEY_B64 in fnox secrets"
            exit 1
          fi

          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY_B64" | base64 --decode > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy with Kamal
        run: kamal deploy
