name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Install tools
        run: mise install

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Decrypt secrets
        run: fnox export --format env >> "$GITHUB_ENV"
        env:
          GLOSSIA_AGE_KEY: ${{ secrets.GLOSSIA_AGE_KEY }}

      - name: Deploy with Kamal
        run: kamal deploy
