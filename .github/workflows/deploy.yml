name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up mise
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Install tools
        run: mise install

      - name: Add server host key
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -R 89.167.60.202 >/dev/null 2>&1 || true
          ssh-keyscan -t ed25519 89.167.60.202 > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy with Kamal
        run: |
          set -euo pipefail

          if [ -z "${GLOSSIA_AGE_KEY:-}" ]; then
            echo "::error::Missing GLOSSIA_AGE_KEY secret"
            exit 1
          fi

          mkdir -p ~/.config/fnox
          printf '%s\n' "$GLOSSIA_AGE_KEY" > ~/.config/fnox/glossia-age.txt
          chmod 600 ~/.config/fnox/glossia-age.txt

          tmp_fnox_env="$(mktemp)"
          fnox export --format env | sed -e '/^#/d' -e '/^$/d' -e 's/^export //' > "$tmp_fnox_env"

          set -a
          source "$tmp_fnox_env"
          set +a

          mkdir -p .kamal
          cp "$tmp_fnox_env" .kamal/secrets-common
          : > .kamal/secrets
          chmod 600 .kamal/secrets-common .kamal/secrets
          rm -f "$tmp_fnox_env"

          if [ -z "${SSH_PRIVATE_KEY_B64:-}" ]; then
            echo "::error::Missing SSH_PRIVATE_KEY_B64 in fnox secrets"
            exit 1
          fi

          ssh_private_key_b64="${SSH_PRIVATE_KEY_B64#\'}"
          ssh_private_key_b64="${ssh_private_key_b64%\'}"

          mkdir -p ~/.ssh
          printf '%s' "$ssh_private_key_b64" | base64 --decode > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          kamal deploy
        env:
          GLOSSIA_AGE_KEY: ${{ secrets.GLOSSIA_AGE_KEY }}
