name: Deploy
on:
  push:
    branches:
      - 'main'

concurrency:
  group: deploy-${{ github.head_ref }}
  cancel-in-progress: true
  
env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  OBAN_WEB_FETCH_PUBLIC_KEY: ${{ secrets.OBAN_WEB_FETCH_PUBLIC_KEY }}
  OBAN_WEB_AUTH_KEY: ${{ secrets.OBAN_WEB_AUTH_KEY}}
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3df4ab11eba7bda6032a0b82a6bb43b11571feac # v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --build-arg OBAN_WEB_FETCH_PUBLIC_KEY=${{env.OBAN_WEB_FETCH_PUBLIC_KEY}} --build-arg OBAN_WEB_AUTH_KEY=${{env.OBAN_WEB_AUTH_KEY}}