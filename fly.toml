# fly.toml app configuration file generated for glossia on 2023-07-11T12:12:41+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "glossia"
primary_region = "ams"
kill_signal = "SIGTERM"

[deploy]
  release_command = "/app/bin/migrate"

[build.args]
  GLOSSIA_PLAN="cloud"

[env]
  PHX_HOST = "glossia.ai"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 1000
