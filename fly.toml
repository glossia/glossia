app = "glossia"
primary_region = "ams"

[deploy]
  release_command = "npx prisma migrate"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
