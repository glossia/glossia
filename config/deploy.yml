service: glossia
image: glossia/glossia

servers:
  web:
    hosts:
      - 89.167.60.202

proxy:
  ssl: true
  host: glossia.ai
  app_port: 4050
  forward_headers: true

registry:
  server: 89.167.60.202:5000
  username: glossia
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: arm64
  remote: ssh://root@89.167.60.202
  context: app
  dockerfile: app/Dockerfile

env:
  clear:
    PHX_HOST: glossia.ai
    OTEL_EXPORTER_OTLP_ENDPOINT: http://glossia-alloy:4317
    OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    OTEL_SERVICE_NAME: glossia-web
    OTEL_DEPLOYMENT_ENVIRONMENT: production
    LOKI_URL: http://glossia-loki:3100
    LOKI_ORG_ID: fake
    CLICKHOUSE_URL: http://glossia-clickhouse:8123/glossia
  secret:
    - DATABASE_URL
    - SECRET_KEY_BASE
    - STRIPE_SECRET_KEY
    - STRIPE_PRICE_ID
    - STRIPE_WEBHOOK_SECRET
    - SENTRY_DSN
    - SENTRY_DSN_JS
    - METRICS_BEARER_TOKEN
    - SMTP_HOST
    - SMTP_PORT
    - SMTP_USERNAME
    - SMTP_PASSWORD
    - OPS_AUTH_PASSWORD
    - GITHUB_CLIENT_ID
    - GITHUB_CLIENT_SECRET
    - GITHUB_WEBHOOK_SECRET
    - GITHUB_APP_ID
    - GITHUB_APP_PRIVATE_KEY
    - GITHUB_APP_SLUG
    - GITLAB_CLIENT_ID
    - GITLAB_CLIENT_SECRET
    - GITLAB_WEBHOOK_SECRET
    - DAYTONA_API_KEY
    - S3_ACCESS_KEY_ID
    - S3_SECRET_ACCESS_KEY
    - S3_ENDPOINT
    - S3_REGION
    - MINIMAX_API_KEY

accessories:
  postgres:
    image: postgres:17
    host: 89.167.60.202
    port: "5432"
    env:
      clear:
        POSTGRES_USER: glossia
        POSTGRES_DB: glossia_prod
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
  clickhouse:
    image: clickhouse/clickhouse-server:24.12-alpine
    host: 89.167.60.202
    env:
      clear:
        CLICKHOUSE_DB: glossia
        CLICKHOUSE_SKIP_USER_SETUP: "1"
    options:
      ulimit: "nofile=262144:262144"
    directories:
      - data:/var/lib/clickhouse
      - logs:/var/log/clickhouse-server
    files:
      - config/clickhouse/logs.xml:/etc/clickhouse-server/config.d/logs.xml
      - config/clickhouse/ipv4-only.xml:/etc/clickhouse-server/config.d/ipv4-only.xml
      - config/clickhouse/low-resources.xml:/etc/clickhouse-server/config.d/low-resources.xml
      - config/clickhouse/default-profile-low-resources-overrides.xml:/etc/clickhouse-server/users.d/default-profile-low-resources-overrides.xml
  registry:
    image: registry:2
    host: 89.167.60.202
    port: "5000"
    directories:
      - data:/var/lib/registry
  loki:
    image: grafana/loki:3.4
    host: 89.167.60.202
    port: "3100"
    files:
      - config/loki/config.yaml:/etc/loki/config.yaml
    cmd: -config.file=/etc/loki/config.yaml
    directories:
      - data:/loki
  tempo:
    image: grafana/tempo:2.8.3
    host: 89.167.60.202
    port: "3200:3200"
    options:
      publish:
        - "4417:4317"
        - "4418:4318"
    files:
      - config/tempo/config.yaml:/etc/tempo/config.yaml
    cmd: -config.file=/etc/tempo/config.yaml
    directories:
      - data:/var/tempo
  prometheus:
    image: prom/prometheus:v3.2.1
    host: 89.167.60.202
    port: "9090"
    files:
      - config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    cmd: --config.file=/etc/prometheus/prometheus.yml --web.enable-remote-write-receiver --storage.tsdb.retention.time=15d --storage.tsdb.retention.size=10GB
    directories:
      - data:/prometheus
  alloy:
    image: grafana/alloy:latest
    host: 89.167.60.202
    port: "12345:12345"
    options:
      publish:
        - "4317:4317"
        - "4318:4318"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    files:
      - config/alloy/config.alloy:/etc/alloy/config.alloy
    env:
      secret:
        - METRICS_BEARER_TOKEN
    cmd: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
  grafana:
    image: grafana/grafana:11.5
    host: 89.167.60.202
    proxy:
      ssl: true
      host: data.glossia.ai
      app_port: 3000
      forward_headers: true
    env:
      clear:
        GF_SERVER_ROOT_URL: https://data.glossia.ai
        GF_SERVER_DOMAIN: data.glossia.ai
        GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      secret:
        - GF_SECURITY_ADMIN_PASSWORD
        - POSTGRES_PASSWORD
    files:
      - config/grafana/provisioning/datasources/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    directories:
      - data:/var/lib/grafana
  plausible-db:
    image: postgres:16-alpine
    host: 89.167.60.202
    env:
      secret:
        - POSTGRES_PASSWORD:PLAUSIBLE_POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
  plausible-events-db:
    image: clickhouse/clickhouse-server:24.12-alpine
    host: 89.167.60.202
    env:
      clear:
        CLICKHOUSE_SKIP_USER_SETUP: "1"
    options:
      ulimit: "nofile=262144:262144"
    directories:
      - data:/var/lib/clickhouse
      - logs:/var/log/clickhouse-server
    files:
      - config/plausible/clickhouse/logs.xml:/etc/clickhouse-server/config.d/logs.xml
      - config/plausible/clickhouse/ipv4-only.xml:/etc/clickhouse-server/config.d/ipv4-only.xml
      - config/plausible/clickhouse/low-resources.xml:/etc/clickhouse-server/config.d/low-resources.xml
      - config/plausible/clickhouse/default-profile-low-resources-overrides.xml:/etc/clickhouse-server/users.d/default-profile-low-resources-overrides.xml
  plausible:
    image: ghcr.io/plausible/community-edition:v3.2.0
    host: 89.167.60.202
    proxy:
      ssl: true
      host: analytics.glossia.ai
      app_port: 8000
      forward_headers: true
      healthcheck:
        path: /login
    cmd: sh -c "/entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    options:
      ulimit: "nofile=65535:65535"
    env:
      clear:
        BASE_URL: https://analytics.glossia.ai
        TMPDIR: /var/lib/plausible/tmp
        DISABLE_REGISTRATION: invite_only
        CLICKHOUSE_DATABASE_URL: http://glossia-plausible-events-db:8123/plausible_events_db
      secret:
        - SECRET_KEY_BASE:PLAUSIBLE_SECRET_KEY_BASE
        - DATABASE_URL:PLAUSIBLE_DATABASE_URL
    directories:
      - data:/var/lib/plausible
  chat2db:
    image: chat2db/chat2db:latest
    host: 89.167.60.202
    proxy:
      ssl: true
      host: db.glossia.ai
      app_port: 10824
      forward_headers: true
      healthcheck:
        path: /login
    directories:
      - data:/root/.chat2db
  bugsink:
    image: bugsink/bugsink:latest
    host: 89.167.60.202
    proxy:
      ssl: true
      host: errors.glossia.ai
      app_port: 8000
      forward_headers: true
      healthcheck:
        path: /health/ready
    env:
      clear:
        PORT: "8000"
        BEHIND_HTTPS_PROXY: "True"
        BASE_URL: https://errors.glossia.ai
        ALLOWED_HOSTS: "*"
        SITE_TITLE: "Glossia Bugsink"
        SINGLE_USER: "True"
        USER_REGISTRATION: CB_NOBODY
        EMAIL_USE_TLS: "True"
      secret:
        - SECRET_KEY:BUGSINK_SECRET_KEY
        - CREATE_SUPERUSER:BUGSINK_CREATE_SUPERUSER
        - EMAIL_HOST:SMTP_HOST
        - EMAIL_HOST_USER:SMTP_USERNAME
        - EMAIL_HOST_PASSWORD:SMTP_PASSWORD
        - EMAIL_PORT:SMTP_PORT
    directories:
      - data:/data
  discourse-postgres:
    image: pgvector/pgvector:pg17
    host: 89.167.60.202
    env:
      clear:
        POSTGRES_USER: discourse
        POSTGRES_DB: discourse
      secret:
        - POSTGRES_PASSWORD:DISCOURSE_POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
  discourse-redis:
    image: redis:7-alpine
    host: 89.167.60.202
    directories:
      - data:/data
  discourse:
    image: discourse/discourse:latest
    host: 89.167.60.202
    proxy:
      ssl: true
      host: community.glossia.ai
      app_port: 80
      forward_headers: true
      healthcheck:
        path: /srv/status
      response_timeout: 600
    env:
      clear:
        DISCOURSE_FORCE_HTTPS: "true"
        DISCOURSE_HOSTNAME: community.glossia.ai
        DISCOURSE_DEVELOPER_EMAILS: pedro@glossia.ai
        DISCOURSE_NOTIFICATION_EMAIL: noreply@glossia.ai
        DISCOURSE_SMTP_ENABLE_START_TLS: "true"
        DISCOURSE_USE_S3: "true"
        DISCOURSE_S3_REGION: auto
        DISCOURSE_S3_BUCKET: glossia-community
        DISCOURSE_DB_HOST: glossia-discourse-postgres
        DISCOURSE_DB_NAME: discourse
        DISCOURSE_DB_USERNAME: discourse
        DISCOURSE_REDIS_HOST: glossia-discourse-redis
        DISCOURSE_SERVE_S3: "true"
        UNICORN_WORKERS: "2"
        DISCOURSE_SIDEKIQ_WORKERS: "3"
      secret:
        - DISCOURSE_DB_PASSWORD:DISCOURSE_POSTGRES_PASSWORD
        - DISCOURSE_SMTP_ADDRESS:SMTP_HOST
        - DISCOURSE_SMTP_PORT:SMTP_PORT
        - DISCOURSE_SMTP_USER_NAME:SMTP_USERNAME
        - DISCOURSE_SMTP_PASSWORD:SMTP_PASSWORD
        - DISCOURSE_S3_ACCESS_KEY_ID
        - DISCOURSE_S3_SECRET_ACCESS_KEY
        - DISCOURSE_S3_ENDPOINT
    files:
      - config/discourse/install-ssl:/etc/runit/1.d/install-ssl
    directories:
      - data:/shared
      - log:/var/log
  peertube-postgres:
    image: postgres:17
    host: 89.167.60.202
    env:
      clear:
        POSTGRES_USER: peertube
        POSTGRES_DB: peertube
      secret:
        - POSTGRES_PASSWORD:PEERTUBE_POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
  peertube-redis:
    image: redis:7-alpine
    host: 89.167.60.202
    directories:
      - data:/data
  peertube:
    image: chocobozzz/peertube:v7.1.0-bookworm
    host: 89.167.60.202
    proxy:
      ssl: true
      host: videos.glossia.ai
      app_port: 9000
      forward_headers: true
      healthcheck:
        path: /api/v1/config
        timeout: 120
      response_timeout: 120
    env:
      clear:
        PEERTUBE_WEBSERVER_HOSTNAME: videos.glossia.ai
        PEERTUBE_WEBSERVER_PORT: "443"
        PEERTUBE_WEBSERVER_HTTPS: "true"
        PEERTUBE_TRUST_PROXY: '["127.0.0.1", "loopback", "172.16.0.0/12"]'
        PEERTUBE_DB_HOSTNAME: glossia-peertube-postgres
        PEERTUBE_DB_NAME: peertube
        PEERTUBE_DB_USERNAME: peertube
        PEERTUBE_REDIS_HOSTNAME: glossia-peertube-redis
        PEERTUBE_ADMIN_EMAIL: pedro@glossia.ai
        PEERTUBE_SMTP_FROM: noreply@glossia.ai
        PEERTUBE_SMTP_TLS: "false"
        PEERTUBE_OBJECT_STORAGE_ENABLED: "true"
        PEERTUBE_OBJECT_STORAGE_UPLOAD_ACL_PUBLIC: "public-read"
        PEERTUBE_OBJECT_STORAGE_UPLOAD_ACL_PRIVATE: "private"
        PEERTUBE_OBJECT_STORAGE_PROXY_ENABLED: "true"
        PEERTUBE_OBJECT_STORAGE_WEB_VIDEOS_PREFIX: "web-videos/"
        PEERTUBE_OBJECT_STORAGE_ORIGINAL_VIDEO_FILES_PREFIX: "original-video-files/"
        PEERTUBE_OBJECT_STORAGE_STREAMING_PLAYLISTS_PREFIX: "streaming-playlists/"
        PEERTUBE_OBJECT_STORAGE_USER_EXPORTS_PREFIX: "user-exports/"
      secret:
        - PEERTUBE_DB_PASSWORD:PEERTUBE_POSTGRES_PASSWORD
        - PEERTUBE_SECRET
        - PEERTUBE_OBJECT_STORAGE_CREDENTIALS_ACCESS_KEY_ID
        - PEERTUBE_OBJECT_STORAGE_CREDENTIALS_SECRET_ACCESS_KEY
        - PEERTUBE_OBJECT_STORAGE_ENDPOINT
        - PEERTUBE_OBJECT_STORAGE_REGION
        - PEERTUBE_OBJECT_STORAGE_WEB_VIDEOS_BUCKET_NAME
        - PEERTUBE_OBJECT_STORAGE_ORIGINAL_VIDEO_FILES_BUCKET_NAME
        - PEERTUBE_OBJECT_STORAGE_STREAMING_PLAYLISTS_BUCKET_NAME
        - PEERTUBE_OBJECT_STORAGE_USER_EXPORTS_BUCKET_NAME
        - PEERTUBE_SMTP_HOSTNAME:SMTP_HOST
        - PEERTUBE_SMTP_PORT:SMTP_PORT
        - PEERTUBE_SMTP_USERNAME:SMTP_USERNAME
        - PEERTUBE_SMTP_PASSWORD:SMTP_PASSWORD
    directories:
      - data:/data
