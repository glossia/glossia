# Daytona local development stack
#
# This compose file runs the Daytona sandbox API locally for development.
# It is based on the official Daytona Docker Compose setup:
# https://github.com/daytonaio/daytona/tree/main/docker
#
# Prerequisites:
#   1. Docker and Docker Compose v2 installed
#   2. At least 4 GB RAM allocated to Docker
#
# Usage:
#   docker compose -f docker/daytona/docker-compose.yml up -d
#
# The API will be available at http://localhost:3000/api
# The proxy (toolbox) will be available at http://localhost:3000
#
# Default API key for local development: "local-dev-key"
# Set this in your environment or use:
#   DAYTONA_API_KEY=local-dev-key iex -S mix

services:
  daytona:
    image: daytonaio/daytona:latest
    ports:
      - "${GLOSSIA_DAYTONA_PORT:-3000}:3000"
    environment:
      - DAYTONA_SERVER_MODE=local
      - DAYTONA_SERVER_API_PORT=3000
      - DAYTONA_DB_PATH=/data/daytona.db
    volumes:
      - daytona-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  daytona-data:
