apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: glossia-postgres
  namespace: glossia
spec:
  instances: 3

  bootstrap:
    initdb:
      database: glossia_prod
      owner: glossia
      secret:
        name: glossia-postgres-app

  storage:
    storageClass: hcloud-volumes
    size: 50Gi

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    nodeSelector:
      node.cluster.x-k8s.io/pool: stateful
    tolerations:
      - key: node.cluster.x-k8s.io/pool
        operator: Equal
        value: stateful
        effect: NoSchedule
