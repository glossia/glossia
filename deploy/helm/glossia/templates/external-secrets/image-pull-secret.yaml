{{- if and .Values.externalSecrets.enabled .Values.externalSecrets.imagePullSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecrets.imagePullSecret.name }}
  labels:
    {{- include "glossia.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    {{- toYaml .Values.externalSecrets.secretStoreRef | nindent 4 }}
  target:
    name: {{ .Values.externalSecrets.imagePullSecret.name }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: {{ printf `{"auths":{"%s":{"username":"{{ .%s }}","password":"{{ .%s }}","auth":"{{ printf "%%s:%%s" .%s .%s | b64enc }}"}}}` .Values.externalSecrets.imagePullSecret.registry .Values.externalSecrets.imagePullSecret.usernameField .Values.externalSecrets.imagePullSecret.passwordField .Values.externalSecrets.imagePullSecret.usernameField .Values.externalSecrets.imagePullSecret.passwordField | quote }}
  dataFrom:
    - extract:
        key: {{ .Values.externalSecrets.imagePullSecret.itemKey | quote }}
{{- end }}
