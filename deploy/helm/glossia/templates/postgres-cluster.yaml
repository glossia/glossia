{{- if .Values.postgres.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Values.postgres.clusterName }}
  labels:
    {{- include "glossia.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.postgres.instances }}

  bootstrap:
    initdb:
      database: {{ .Values.postgres.database | quote }}
      owner: {{ .Values.postgres.user | quote }}
      secret:
        name: {{ .Values.postgres.appSecretName }}

  storage:
    storageClass: {{ .Values.postgres.storage.storageClass | quote }}
    size: {{ .Values.postgres.storage.size | quote }}

  resources:
    {{- toYaml .Values.postgres.resources | nindent 4 }}

  {{- if and .Values.backups.enabled .Values.backups.postgres.enabled }}
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: {{ printf "%s-backup" .Values.postgres.clusterName | quote }}
  {{- end }}

  affinity:
    enablePodAntiAffinity: {{ .Values.postgres.enablePodAntiAffinity }}
    topologyKey: {{ .Values.postgres.topologyKey | quote }}
    {{- with .Values.postgres.nodeSelector }}
    nodeSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.postgres.tolerations }}
    tolerations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
{{- end }}
